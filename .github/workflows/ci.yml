name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          manifest-path: pixi.toml
          environments: dev
      - name: Lint
        run: pixi run -e dev lint
      - name: Format Check
        run: pixi run -e dev format -- --check
      - name: Setup Config
        run: cp engine/webapp/config.py.template engine/webapp/config.py
      - name: Test
        run: pixi run -e dev test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          manifest-path: pixi.toml
          environments: studio
      - name: Setup Config
        run: cp studio/src/config.template.ts studio/src/config.ts
      - name: Lint
        run: pixi run studio-lint
      - name: Test (Unit & Component)
        run: pixi run studio-test
      - name: Install Playwright Browsers
        run: pixi run studio-playwright-install
      - name: Run Playwright E2E Tests
        run: pixi run studio-e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: studio/playwright-report/
          retention-days: 7
