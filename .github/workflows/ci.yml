name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.5
          manifest-path: engine/pyproject.toml
      - name: Lint
        run: pixi run -e dev lint
      - name: Format Check
        run: pixi run -e dev ruff format --check webapp/ tests/
      - name: Test
        run: pixi run -e dev test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: studio/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
